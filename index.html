<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector QR Profesional</title>
    <script src="https://unpkg.com" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 20px; background-color: #f4f4f9; }
        #lector { width: 100%; max-width: 400px; margin: 20px auto; border: 2px solid #333; background: #000; min-height: 300px; }
        button { padding: 12px 24px; font-size: 1rem; margin: 5px; cursor: pointer; border-radius: 5px; border: none; background-color: #007bff; color: white; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        #resultado { margin-top: 20px; font-size: 1.2rem; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

    <h1>Escáner QR</h1>
    
    <button id="btn-encender">Iniciar Escáner</button>
    <button id="btn-apagar" disabled>Detener</button>

    <div id="lector"></div>
    <div id="resultado">Estado: Cámara apagada</div>

    <script>
        const html5QrCode = new Html5Qrcode("lector");
        const btnEncender = document.getElementById('btn-encender');
        const btnApagar = document.getElementById('btn-apagar');
        const contenedorResultado = document.getElementById('resultado');

        btnEncender.addEventListener('click', () => {
            contenedorResultado.innerText = "Estado: Solicitando acceso...";
            
            // Usamos la configuración estándar recomendada por la documentación de GitHub
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (textoDecodificado) => {
                    contenedorResultado.innerHTML = `<strong>Detectado:</strong> <a href="${textoDecodificado}" target="_blank">${textoDecodificado}</a>`;
                },
                (error) => { /* Silenciar alertas de lectura fallida instantánea */ }
            )
            .then(() => {
                btnEncender.disabled = true;
                btnApagar.disabled = false;
                contenedorResultado.innerText = "Estado: Buscando código QR...";
            })
            .catch((err) => {
                contenedorResultado.innerText = `Error: ${err}`;
                // Alerta nativa para identificar el problema exacto en pantallas móviles
                alert("Error al iniciar cámara: " + err + "\n\nRecuerda que debes abrir esta página usando HTTPS de forma obligatoria.");
            });
        });

        btnApagar.addEventListener('click', () => {
            html5QrCode.stop().then(() => {
                contenedorResultado.innerText = "Estado: Cámara apagada";
                btnEncender.disabled = false;
                btnApagar.disabled = true;
            });
        });
    </script>

</body>
</html>
